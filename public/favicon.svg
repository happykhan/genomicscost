<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Stylised helix rungs -->
  <line x1="8" y1="7"  x2="24" y2="11" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="8" y1="12" x2="24" y2="16" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="17" x2="24" y2="21" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Left backbone -->
  <path d="M8 5 Q6 16 8 27" stroke="#2dd4bf" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right backbone -->
  <path d="M24 9 Q26 20 24 27" stroke="#64d8c8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Dollar marker -->
  <circle cx="24" cy="24" r="6" fill="#0f172a"/>
  <text x="24" y="28" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#2dd4bf" text-anchor="middle">$</text>
</svg>
